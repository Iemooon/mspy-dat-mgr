name: Build Windows release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller
      - name: Run regression suite
        run: python run_regression.py
      - name: Build green package
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name mspy-dat-mgr --paths . main.py
          Copy-Item README.txt dist/mspy-dat-mgr/README.txt
          Compress-Archive -Path dist/mspy-dat-mgr -DestinationPath dist/mspy-dat-mgr-${{ github.ref_name }}-windows-x64.zip
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/mspy-dat-mgr-${{ github.ref_name }}-windows-x64.zip
